name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Mondays at 08:00 UTC
    - cron: "0 8 * * 1"

jobs:
  bandit:
    name: Bandit SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install "bandit[toml]>=1.7"
      - name: Run bandit
        continue-on-error: true
        run: bandit -r pyntrace/ -c pyproject.toml --severity-level medium -f json -o bandit-report.json
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit --requirement <(pip install -e . --dry-run --ignore-installed -q 2>&1 | grep -v "Would install" || true) --skip-editable || pip-audit -r <(pip freeze) --ignore-vuln PYSEC-2024-48

  ruff-security:
    name: Ruff security rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Check security rules (S series)
        run: |
          ruff check pyntrace/ --select S --output-format github \
            --ignore S110,S311,S603,S607,S310,S608,S104
          # S110: try-except-pass — intentional optional dependency guards
          # S311: random — non-crypto random is correct for attack fuzzing
          # S603/S607: subprocess — CLI tool needs subprocess, git by name
          # S310: urlopen — HTTP client calls are intentional (agents, webhooks)
          # S608: SQL string build — table names are hardcoded internal literals
          # S104: bind 0.0.0.0 — Prometheus/Docker deployments need this
