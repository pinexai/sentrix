  <circle cx="40" cy="16" r="6" fill="#febc2e"/>
  <circle cx="60" cy="16" r="6" fill="#28c840"/>
  <text x="360" y="21" text-anchor="middle" font-family="SF Mono, monospace" font-size="12" fill="#8b949e">sentrix — Attack Heatmap</text>

