  <text x="370" y="182" class="mono header">│</text>
  <text x="385" y="182" class="mono green"> █░░░░░░░░░  8% </text>
  <text x="537" y="182" class="mono header">│</text>
  <text x="552" y="182" class="mono green">  █░░░░░░░░░  6%</text>

